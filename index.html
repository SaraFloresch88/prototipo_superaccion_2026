<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pomodoro</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

/* PANTALLAS */

.screen{
    width:100vw;
    height:100vh;
    display:none;

    justify-content:center;
    align-items:center;
    flex-direction:column;

    transition:0.5s;
}

.active{
    display:flex;
}

/* ESTUDIO */

#studyScreen{
    background:#1e293b;
    color:white;
}

/* DESCANSO */

#breakScreen{
    background:#dbeafe;
    color:#111827;
}

h1{
    font-size:4rem;
    margin-bottom:20px;
}

.timer{
    font-size:7rem;
    font-weight:bold;
}

.subtitle{
    margin-top:20px;
    font-size:1.5rem;
}

</style>
</head>

<body>

<!-- ESTUDIO -->

<div id="studyScreen" class="screen active">

    <h1>Tiempo de estudio</h1>

    <div id="studyTimer" class="timer">
        25:00
    </div>

    <div class="subtitle">
        Concéntrate en tus tareas
    </div>

</div>

<!-- DESCANSO -->

<div id="breakScreen" class="screen">

    <h1>Tiempo de descanso</h1>

    <div id="breakTimer" class="timer">
        05:00
    </div>

    <div class="subtitle">
        Relájate un momento ☕
    </div>

</div>

<script>

/* TIEMPOS */

const STUDY_TIME = 25 * 60;
const BREAK_TIME = 5 * 60;

/* ELEMENTOS */

const studyScreen = document.getElementById("studyScreen");
const breakScreen = document.getElementById("breakScreen");

const studyTimer = document.getElementById("studyTimer");
const breakTimer = document.getElementById("breakTimer");

/* VARIABLES */

let timeLeft = STUDY_TIME;
let isStudy = true;

/* FORMATO */

function formatTime(seconds){

    let mins = Math.floor(seconds / 60);
    let secs = seconds % 60;

    if(secs < 10){
        secs = "0" + secs;
    }

    return mins + ":" + secs;
}

/* ACTUALIZAR */

function update(){

    if(isStudy){

        studyTimer.innerText = formatTime(timeLeft);

    }else{

        breakTimer.innerText = formatTime(timeLeft);
    }

    timeLeft--;

    if(timeLeft < 0){

        switchMode();
    }
}

/* CAMBIAR MODO */

function switchMode(){

    if(isStudy){

        isStudy = false;

        timeLeft = BREAK_TIME;

        studyScreen.classList.remove("active");
        breakScreen.classList.add("active");

    }else{

        isStudy = true;

        timeLeft = STUDY_TIME;

        breakScreen.classList.remove("active");
        studyScreen.classList.add("active");
    }
}

/* INICIAR */

update();

setInterval(update,1000);

</script>

</body>
</html>
