<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Descanso</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#dbeafe;
    color:#111827;
    font-family:Arial;
}

#timer{
    font-size:6rem;
}
</style>
</head>

<body>

<h1>Tiempo de descanso</h1>
<div id="timer">05:00</div>

<script>

let timeLeft = 5 * 60;

const timer = document.getElementById("timer");

function updateTimer(){

    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;

    if(seconds < 10){
        seconds = "0" + seconds;
    }

    timer.innerText = minutes + ":" + seconds;

    if(timeLeft <= 0){

        window.location.href = "index.html";

    }

    timeLeft--;

}

updateTimer();

setInterval(updateTimer,1000);

</script>

</body>
</html>
